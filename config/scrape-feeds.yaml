# Scrape Feed Configuration
# Add feeds here and run: bash scripts/import-scrape-feeds.sh

feeds:
  # ============================================================================
  # FINTECH & PAYMENTS STRATEGY
  # ============================================================================
  - name: "Stripe News"
    url: "https://stripe.com/newsroom/news"
    type: "scrape"
    selector: "h3"  # Verified selector for Stripe news headlines
    category: "Fintech"

  - name: "Plaid Blog"
    url: "https://plaid.com/blog/"
    type: "scrape"
    selector: "article h2"
    category: "Fintech"

  - name: "Adyen Blog"
    url: "https://www.adyen.com/blog"
    type: "scrape"
    selector: "h3.text-heading-3"
    category: "Payments"

  - name: "Marqeta Press Releases"
    url: "https://investors.marqeta.com/news-releases"
    type: "scrape"
    selector: "a.module-headline-link"
    category: "Payments"

  - name: "Block (Square) News"
    url: "https://squareup.com/us/en/press"
    type: "scrape"
    selector: "h3"
    category: "Fintech"

  - name: "PayPal Newsroom"
